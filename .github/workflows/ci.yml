name: ci
on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all
      - uses: EmbarkStudios/cargo-deny-action@v2
      - run: cargo install cargo-audit --locked && cargo audit

  build-matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # Skip the cache for `cross` legs: a warm cache restores a host/target proc-macro
      # state that breaks the in-container build (zerofrom_derive E0463). Cold builds
      # of the cross legs succeed. Re-enable with a cross-aware key if build time bites.
      - if: ${{ !matrix.cross }}
        uses: Swatinem/rust-cache@v2
      - if: matrix.cross
        run: cargo install cross --locked
      - name: Build
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      - name: Assert self-contained binary (Linux musl = no dynamic NEEDED libs)
        if: runner.os == 'Linux'
        run: |
          BIN=target/${{ matrix.target }}/release/secretagent
          file "$BIN"
          # musl targets default to static / static-pie; ldd can't see static-pie and
          # can't analyze the foreign-arch (aarch64) binary. readelf is the real check:
          # a self-contained binary has no NEEDED shared-library entries on any arch.
          if readelf -d "$BIN" 2>/dev/null | grep -q 'NEEDED'; then
            echo "::error::musl binary links shared libraries (not self-contained)"; readelf -d "$BIN"; exit 1
          fi
          echo "ok: no dynamic NEEDED entries (static / static-pie)"

      - name: Assert only OS dylibs (macOS native single binary)
        if: runner.os == 'macOS'
        run: |
          BIN=target/${{ matrix.target }}/release/secretagent
          otool -L "$BIN"
          if otool -L "$BIN" | tail -n +2 | grep -vE '/usr/lib/|/System/'; then
            echo "::error::third-party dylib linked"; exit 1
          fi

      - name: Assert no vendored DLL (Windows native single exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/secretagent.exe"
          & "$bin" --version
          if (Get-ChildItem (Split-Path $bin) -Filter *.dll) { throw "vendored DLL present beside the exe" }

      - name: Headless doctor (Linux, no D-Bus / no TTY / no keyring)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          BIN=target/${{ matrix.target }}/release/secretagent
          env -i SECRETAGENT_DATA_DIR="$RUNNER_TEMP/sa" "$BIN" vault init
          env -i SECRETAGENT_DATA_DIR="$RUNNER_TEMP/sa" "$BIN" doctor
