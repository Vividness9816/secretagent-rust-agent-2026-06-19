name: release
# Tag-triggered (push a `v*` tag). Builds the cross-compile matrix, produces a signed checksums
# manifest (minisign) + optional Windows Authenticode, a distroless multi-arch container, and a
# GitHub release with every artifact. ci.yml still runs on the tagged commit (full fmt/clippy/test
# + the per-OS self-contained-binary asserts), so this workflow is packaging-only.
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub release
  packages: write   # push the container image to GHCR

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl,  cross: true,  ext: '' }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-musl, cross: true,  ext: '' }
          - { os: macos-latest,   target: aarch64-apple-darwin,       cross: false, ext: '' }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,     cross: false, ext: '.exe' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - if: matrix.cross
        run: cargo install cross --locked
      - name: Build (release)
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}
      - name: Stage per-target asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/secretagent${{ matrix.ext }}" \
             "dist/secretagent-${{ matrix.target }}${{ matrix.ext }}"
      # Windows Authenticode — the native "Verified publisher: Dylan N" trust. Skipped gracefully if
      # the PFX secret is absent (sign locally instead via ~/.codesign/sign-codesign.ps1).
      - name: Authenticode sign (Windows, if cert secret present)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_PFX_BASE64) {
            Write-Host '::warning::no WINDOWS_PFX_BASE64 secret — Windows artifact UNSIGNED (sign locally via ~/.codesign/sign-codesign.ps1)'
            exit 0
          }
          $pfx = "$env:RUNNER_TEMP\sign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
          $st = (Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe' | Select-Object -Last 1).FullName
          & $st sign /f $pfx /p $env:WINDOWS_PFX_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 "dist\secretagent-${{ matrix.target }}.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4   # for the install scripts shipped as release assets
      - uses: actions/download-artifact@v4
        with:
          path: staged
      - name: Collect binaries + checksum them (scripts added AFTER, so they're not in SHA256SUMS)
        run: |
          mkdir -p dist
          find staged -type f -exec cp {} dist/ \;
          cd dist && sha256sum * > SHA256SUMS && cat SHA256SUMS
      - name: Ship the install scripts as release assets (fetched over HTTPS; not checksummed)
        run: cp install.sh install.ps1 dist/
      - name: Sign the checksums (minisign — REQUIRED; the release's trust anchor)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          if [ -z "$MINISIGN_SECRET_KEY" ]; then
            echo "::error::MINISIGN_SECRET_KEY secret is not set — generate a key (minisign -G -W) and add it before releasing"; exit 1
          fi
          sudo apt-get update && sudo apt-get install -y minisign
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$RUNNER_TEMP/minisign.key"
          minisign -S -s "$RUNNER_TEMP/minisign.key" -m dist/SHA256SUMS   # password-less CI key (-W)
          rm -f "$RUNNER_TEMP/minisign.key"
          ls -l dist/SHA256SUMS dist/SHA256SUMS.minisig
      - name: Build + sign the self-update manifest (latest.json — version + per-target url/sha256)
        # Consumed by `secretagent self-update` (6h): the SAME minisign key signs it; the binary
        # verifies it against the PINNED pubkey. `version` is the tag (drives no-downgrade — so the
        # deployed binary's Cargo.toml version MUST match the tag, see docs/RELEASE.md).
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          TAG="${GITHUB_REF_NAME}"; VERSION="${TAG#v}"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          cd dist
          artifacts="{}"
          for f in secretagent-*; do
            case "$f" in *.minisig|*.json) continue;; esac   # never list the manifest/sigs as artifacts
            target="${f%.exe}"; target="${target#secretagent-}"
            sha=$(sha256sum "$f" | awk '{print $1}')
            artifacts=$(printf '%s' "$artifacts" | jq --arg t "$target" --arg u "$BASE/$f" --arg s "$sha" '.[$t]={url:$u,sha256:$s}')
          done
          jq -n --arg v "$VERSION" --argjson a "$artifacts" '{version:$v, artifacts:$a}' > latest.json
          cat latest.json
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$RUNNER_TEMP/minisign.key"
          minisign -S -s "$RUNNER_TEMP/minisign.key" -m latest.json     # password-less CI key
          rm -f "$RUNNER_TEMP/minisign.key"
          ls -l latest.json latest.json.minisig
      - name: GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  container:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/vividness9816/secretagent
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
