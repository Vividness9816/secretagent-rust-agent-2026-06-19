[advisories]
yanked = "deny"
ignore = [
    # proc-macro-error (unmaintained) — transitive, BUILD-TIME proc-macro pulled by
    # age's i18n/fluent stack. No runtime surface. Revisit if age drops the i18n dep.
    "RUSTSEC-2024-0370",
]

[bans]
multiple-versions = "warn"

[licenses]
# Phase 0 dependency closure only. Extend per-phase as crates land (ADR "Revisit when").
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0", # Mozilla CA root bundle via webpki-roots (reqwest rustls)
    "0BSD", # BSD Zero Clause (OSI-approved, public-domain-equivalent) via quoted_printable, a
            # transitive dep of lettre + mailparse (Phase 4c email connector).
]
confidence-threshold = 0.9
