[advisories]
yanked = "deny"

[bans]
multiple-versions = "warn"

[licenses]
# Phase 0 dependency closure only. Extend per-phase as crates land (ADR "Revisit when").
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.9
